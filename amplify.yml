version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install -g pnpm
        - rm -rf node_modules
        - pnpm install
    build:
      commands:
        - pnpm build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
